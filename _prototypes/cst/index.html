<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owners Mockup</title>
    <link rel="icon" href="../../assets/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="../../assets/x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="../../assets/x96.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="../../assets/x192.png" />
    <link rel="manifest" href="../../assets/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="../../scripts/gate.js"></script>
  <link rel="stylesheet" href="../../styles/gate.css">
</head>
<body class="access-locked">
  <div class="access-gate" data-access-gate>
    <form class="access-gate__panel" data-access-form autocomplete="on" method="get" action="./">
      <label class="access-gate__label" for="accessPassword">To access this page enter password:</label>
      <input type="text" name="username" autocomplete="username" value="prototype-access" hidden readonly>
      <input class="access-gate__input" id="accessPassword" data-access-password type="password" name="password" autocomplete="current-password" autofocus>
      <button class="ui-control ui-button ui-button-primary access-gate__button" type="submit">Access</button>
      <p class="access-gate__error" data-access-error role="alert" hidden>Incorrect password.</p>
    </form>
  </div>

  <main class="card">
    <aside class="filter-panel" id="filterPanel" aria-label="Filters">
      <div class="filter-scroll">
        <div class="filter-header">
          <h2>Filter</h2>
          <p id="filterSummary">Showing 0 of 0 records sorted by relevancy</p>
        </div>

        <section class="filter-section">
          <button class="ui-control ui-button-ghost filter-section-title" type="button" aria-expanded="true">
            <span>Location</span>
            <img src="assets/chevron.svg" alt="" aria-hidden="true">
          </button>
          <div class="filter-select-field">
            <select class="ui-select filter-field-select" id="locationFilterSelect" aria-label="Select location" required>
              <option value="">Select location...</option>
            </select>
            <img src="assets/chevron.svg" alt="" aria-hidden="true">
          </div>
          <label class="filter-check filter-check-muted">
            <input type="checkbox" disabled>
            <span class="filter-checkbox" aria-hidden="true"></span>
            <span>Use radius</span>
          </label>
        </section>

        <section class="filter-section filter-section-collapsed">
          <button class="ui-control ui-button-ghost filter-section-title" type="button" aria-expanded="false">
            <span>Category</span>
            <img src="assets/chevron.svg" alt="" aria-hidden="true">
          </button>
          <div class="filter-select-field">
            <select class="ui-select filter-field-select" id="categoryFilterSelect" aria-label="Select category" required disabled>
              <option value="">Select category...</option>
            </select>
            <img src="assets/chevron.svg" alt="" aria-hidden="true">
          </div>
        </section>

        <section class="filter-section filter-section-collapsed">
          <button class="ui-control ui-button-ghost filter-section-title" type="button" aria-expanded="false">
            <span>Owners</span>
            <img src="assets/chevron.svg" alt="" aria-hidden="true">
          </button>
          <div class="filter-select-field">
            <select class="ui-select filter-field-select" id="ownerFilterSelect" aria-label="Select owner" required>
              <option value="">Select owner...</option>
            </select>
            <img src="assets/chevron.svg" alt="" aria-hidden="true">
          </div>
        </section>

        <section class="filter-section filter-section-collapsed">
          <button class="ui-control ui-button-ghost filter-section-title" type="button" aria-expanded="false">
            <span>Franchise</span>
            <img src="assets/chevron.svg" alt="" aria-hidden="true">
          </button>
          <div class="filter-select-field">
            <select class="ui-select filter-field-select" id="franchiseFilterSelect" aria-label="Select franchise" required>
              <option value="">Select franchise...</option>
            </select>
            <img src="assets/chevron.svg" alt="" aria-hidden="true">
          </div>
        </section>

        <section class="filter-section filter-section-collapsed">
          <button class="ui-control ui-button-ghost filter-section-title" type="button" aria-expanded="false">
            <span>Units</span>
            <img src="assets/chevron.svg" alt="" aria-hidden="true">
          </button>
          <div class="range-track filter-range-slider" aria-label="Units range">
            <span class="range-line"></span>
            <span class="range-fill" id="unitsRangeFill"></span>
            <input class="range-input range-input-min" id="unitsMinRange" type="range" min="0" max="0" value="0" aria-label="Minimum units">
            <input class="range-input range-input-max" id="unitsMaxRange" type="range" min="0" max="0" value="0" aria-label="Maximum units">
          </div>
          <div class="filter-range-labels">
            <span>Minimum</span>
            <span>Maximum</span>
          </div>
          <div class="filter-input-row">
            <input class="filter-value filter-number-input" id="unitsMinInput" type="number" inputmode="numeric" aria-label="Minimum units">
            <span class="filter-range-separator">-</span>
            <input class="filter-value filter-number-input" id="unitsMaxInput" type="number" inputmode="numeric" aria-label="Maximum units">
          </div>
        </section>

        <section class="filter-section filter-section-collapsed">
          <button class="ui-control ui-button-ghost filter-section-title" type="button" aria-expanded="false">
            <span>Contacts</span>
            <img src="assets/chevron.svg" alt="" aria-hidden="true">
          </button>
          <div class="range-track filter-range-slider" aria-label="Contacts range">
            <span class="range-line"></span>
            <span class="range-fill" id="contactsRangeFill"></span>
            <input class="range-input range-input-min" id="contactsMinRange" type="range" min="0" max="0" value="0" aria-label="Minimum contacts">
            <input class="range-input range-input-max" id="contactsMaxRange" type="range" min="0" max="0" value="0" aria-label="Maximum contacts">
          </div>
          <div class="filter-range-labels">
            <span>Minimum</span>
            <span>Maximum</span>
          </div>
          <div class="filter-input-row">
            <input class="filter-value filter-number-input" id="contactsMinInput" type="number" inputmode="numeric" aria-label="Minimum contacts">
            <span class="filter-range-separator">-</span>
            <input class="filter-value filter-number-input" id="contactsMaxInput" type="number" inputmode="numeric" aria-label="Maximum contacts">
          </div>
        </section>

        <section class="filter-section filter-section-collapsed">
          <button class="ui-control ui-button-ghost filter-section-title" type="button" aria-expanded="false">
            <span>Status</span>
            <img src="assets/chevron.svg" alt="" aria-hidden="true">
          </button>
          <label class="filter-check">
            <input class="status-filter-input" type="checkbox">
            <span class="filter-checkbox" aria-hidden="true"></span>
            <span>Verified</span>
          </label>
          <label class="filter-check">
            <input class="status-filter-input" type="checkbox">
            <span class="filter-checkbox" aria-hidden="true"></span>
            <span>Public figure</span>
          </label>
          <label class="filter-check">
            <input class="status-filter-input" type="checkbox">
            <span class="filter-checkbox" aria-hidden="true"></span>
            <span>Agent represented</span>
          </label>
          <label class="filter-check">
            <input class="status-filter-input" type="checkbox">
            <span class="filter-checkbox" aria-hidden="true"></span>
            <span>Multi-brand operator</span>
          </label>
          <label class="filter-check">
            <input class="status-filter-input" type="checkbox">
            <span class="filter-checkbox" aria-hidden="true"></span>
            <span>Multi-unit operator</span>
          </label>
        </section>

        <section class="filter-section filter-section-collapsed">
          <button class="ui-control ui-button-ghost filter-section-title" type="button" aria-expanded="false">
            <span>Net worth</span>
            <img src="assets/chevron.svg" alt="" aria-hidden="true">
          </button>
          <div class="range-track" aria-hidden="true">
            <span class="range-line"></span>
            <span class="range-thumb range-thumb-min"></span>
            <span class="range-thumb range-thumb-max"></span>
          </div>
          <div class="filter-range-labels">
            <span>Minimum</span>
            <span>Maximum</span>
          </div>
          <div class="filter-input-row">
            <div class="filter-value">$ 0</div>
            <span class="filter-range-separator">-</span>
            <div class="filter-value">$ 1B</div>
          </div>
        </section>
      </div>
      <div class="filter-actions">
        <button class="ui-control ui-button ui-button-muted clear-filters-btn" id="clearAllFilters" type="button">Clear all (0)</button>
      </div>
    </aside>

    <div class="content-shell">
      <div class="header" aria-label="Owners toolbar">
        <div class="toolbar-group toolbar-primary">
          <button class="ui-control ui-button ui-button-ghost filter-toggle-btn toolbar-btn" id="filterToggle" type="button" aria-label="Toggle filters" title="Toggle filters" aria-controls="filterPanel" aria-expanded="false">
            <img class="toolbar-asset-icon filter-toggle-icon" src="assets/filters.svg" alt="" aria-hidden="true">
            <span id="filterToggleLabel">Filters</span>
          </button>
          <span class="toolbar-divider" aria-hidden="true"></span>
          <label class="toolbar-search-btn toolbar-btn" for="toolbarSearchInput" role="search">
            <img class="toolbar-asset-icon toolbar-search-icon" src="assets/search.svg" alt="" aria-hidden="true">
            <input
              class="toolbar-search-input"
              id="toolbarSearchInput"
              type="search"
              inputmode="search"
              autocomplete="off"
              placeholder="Search by name, brand or location..."
              aria-label="Search owners, contacts, locations, and franchises"
            >
            <button class="toolbar-search-clear" id="toolbarSearchClear" type="button" aria-label="Clear search" hidden></button>
          </label>
        </div>

        <div class="toolbar-group toolbar-actions">
          <details class="toolbar-dropdown">
            <summary class="ui-control ui-button ui-button-ghost toolbar-menu toolbar-btn" aria-label="More options" title="More options">
              <img class="toolbar-asset-icon" src="assets/menu.svg" alt="" aria-hidden="true">
              <img class="toolbar-chevron" src="assets/chevron.svg" alt="" aria-hidden="true">
            </summary>
            <div class="ui-menu toolbar-dropdown-menu" role="menu" aria-label="More options menu">
              <button class="ui-menu-item toolbar-dropdown-option toolbar-dropdown-action" type="button" role="menuitem">
                <img class="toolbar-dropdown-icon" src="assets/export-csv.svg" alt="" aria-hidden="true">
                <span class="toolbar-dropdown-label">Export CSV</span>
              </button>
              <button class="ui-menu-item toolbar-dropdown-option toolbar-dropdown-action" type="button" role="menuitem">
                <img class="toolbar-dropdown-icon" src="assets/mail.svg" alt="" aria-hidden="true">
                <span class="toolbar-dropdown-label">Email campaign</span>
              </button>
              <div class="toolbar-dropdown-divider" aria-hidden="true"></div>
              <div class="toolbar-submenu" data-toolbar-submenu>
                <button class="ui-menu-item toolbar-dropdown-option toolbar-dropdown-action toolbar-submenu-trigger" id="toolbarSettingsSubmenuTrigger" type="button" role="menuitem" aria-haspopup="menu" aria-expanded="false" aria-controls="toolbarSettingsSubmenu">
                  <span class="toolbar-dropdown-icon-placeholder" aria-hidden="true"></span>
                  <span class="toolbar-dropdown-label">Settings</span>
                  <img class="toolbar-submenu-chevron" src="assets/chevron.svg" alt="" aria-hidden="true">
                </button>
                <div class="ui-menu toolbar-submenu-menu" id="toolbarSettingsSubmenu" role="menu" aria-label="Settings menu">
                  <button class="ui-menu-item toolbar-dropdown-option" id="reduceMotionToggleOption" type="button" role="menuitemcheckbox" aria-checked="false">
                    <span class="toolbar-switch" aria-hidden="true"></span>
                    <span class="toolbar-dropdown-label">Reduce motion</span>
                  </button>
                  <div class="toolbar-dropdown-divider" aria-hidden="true"></div>
                  <button class="ui-menu-item toolbar-dropdown-option toolbar-dropdown-action" id="takeScreenshotOption" type="button" role="menuitem">
                    <img class="toolbar-dropdown-icon toolbar-screenshot-icon" src="assets/screenshot.svg" alt="" aria-hidden="true">
                    <span class="toolbar-dropdown-label">Take screenshot</span>
                  </button>
                  <button class="ui-menu-item toolbar-dropdown-option toolbar-dropdown-action" id="resetViewOption" type="button" role="menuitem">
                    <img class="toolbar-dropdown-icon" src="assets/reset.svg" alt="" aria-hidden="true">
                    <span class="toolbar-dropdown-label">Reset view</span>
                  </button>
                </div>
              </div>
            </div>
          </details>
          <div class="toolbar-tabs segmented-control toolbar-btn-divider-left">
            <div class="toolbar-tab-item">
              <button class="ui-control ui-button ui-button-ghost ui-icon-button circle-btn toolbar-btn segmented-control-btn" id="mapToggle" type="button" aria-label="Toggle map" aria-controls="mapPanel" aria-expanded="false">
                <img class="toolbar-asset-icon" src="assets/map.svg" alt="" aria-hidden="true">
                <span class="toolbar-tab-label">Map</span>
              </button>
              <div class="toolbar-tab-dropdown">
                <div class="ui-menu toolbar-dropdown-menu toolbar-tab-dropdown-menu" role="menu" aria-label="Map panel options menu">
                  <button class="ui-menu-item toolbar-dropdown-option toolbar-dropdown-action toolbar-tab-hide-panel-option" type="button" role="menuitem">
                    <img class="toolbar-dropdown-icon" src="assets/sidebar.svg" alt="" aria-hidden="true">
                    <span class="toolbar-dropdown-label">Hide panel</span>
                  </button>
                  <div class="toolbar-dropdown-divider" aria-hidden="true"></div>
                  <div class="toolbar-tab-dropdown-heading ui-muted">Resize & Arrange</div>
                  <div class="toolbar-tab-layout-options" role="group" aria-label="Panel layout options">
                    <button class="ui-control ui-button ui-button-ghost toolbar-tab-layout-option is-active" type="button" data-layout="right" aria-label="Panel on right">
                      <span class="toolbar-tab-layout-preview is-right" aria-hidden="true"></span>
                    </button>
                    <button class="ui-control ui-button ui-button-ghost toolbar-tab-layout-option" type="button" data-layout="split" aria-label="50:50 split panel">
                      <span class="toolbar-tab-layout-preview is-split" aria-hidden="true"></span>
                    </button>
                    <button class="ui-control ui-button ui-button-ghost toolbar-tab-layout-option" type="button" data-layout="bottom" aria-label="Panel on bottom">
                      <span class="toolbar-tab-layout-preview is-bottom" aria-hidden="true"></span>
                    </button>
                    <button class="ui-control ui-button ui-button-ghost toolbar-tab-layout-option" type="button" data-layout="full" aria-label="Full panel">
                      <span class="toolbar-tab-layout-preview is-full" aria-hidden="true"></span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
            <div class="toolbar-tab-item">
              <button class="ui-control ui-button ui-button-ghost ui-icon-button circle-btn toolbar-btn segmented-control-btn segmented-control-btn-divider-left" id="orgChartToggle" type="button" aria-label="Hierarchy view" aria-controls="mapPanel" aria-pressed="false">
                <img class="toolbar-asset-icon" src="assets/orgchart.svg" alt="" aria-hidden="true">
                <span class="toolbar-tab-label">Org. Chart</span>
              </button>
              <div class="toolbar-tab-dropdown">
                <div class="ui-menu toolbar-dropdown-menu toolbar-tab-dropdown-menu" role="menu" aria-label="Org chart panel options menu">
                  <button class="ui-menu-item toolbar-dropdown-option toolbar-dropdown-action toolbar-tab-hide-panel-option" type="button" role="menuitem">
                    <img class="toolbar-dropdown-icon" src="assets/sidebar.svg" alt="" aria-hidden="true">
                    <span class="toolbar-dropdown-label">Hide panel</span>
                  </button>
                  <div class="toolbar-dropdown-divider" aria-hidden="true"></div>
                  <div class="toolbar-tab-dropdown-heading ui-muted">Resize & Arrange</div>
                  <div class="toolbar-tab-layout-options" role="group" aria-label="Panel layout options">
                    <button class="ui-control ui-button ui-button-ghost toolbar-tab-layout-option is-active" type="button" data-layout="right" aria-label="Panel on right">
                      <span class="toolbar-tab-layout-preview is-right" aria-hidden="true"></span>
                    </button>
                    <button class="ui-control ui-button ui-button-ghost toolbar-tab-layout-option" type="button" data-layout="split" aria-label="50:50 split panel">
                      <span class="toolbar-tab-layout-preview is-split" aria-hidden="true"></span>
                    </button>
                    <button class="ui-control ui-button ui-button-ghost toolbar-tab-layout-option" type="button" data-layout="bottom" aria-label="Panel on bottom">
                      <span class="toolbar-tab-layout-preview is-bottom" aria-hidden="true"></span>
                    </button>
                    <button class="ui-control ui-button ui-button-ghost toolbar-tab-layout-option" type="button" data-layout="full" aria-label="Full panel">
                      <span class="toolbar-tab-layout-preview is-full" aria-hidden="true"></span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
            <div class="toolbar-tab-item">
              <button class="ui-control ui-button ui-button-ghost ui-icon-button circle-btn toolbar-btn segmented-control-btn segmented-control-btn-divider-left" id="contactsToggle" type="button" aria-label="Toggle contacts view" aria-pressed="false">
                <img class="toolbar-asset-icon contacts-toggle-icon" src="assets/contacts.svg" alt="" aria-hidden="true">
                <span class="toolbar-tab-label">Contacts</span>
              </button>
              <div class="toolbar-tab-dropdown">
                <div class="ui-menu toolbar-dropdown-menu toolbar-tab-dropdown-menu" role="menu" aria-label="Contacts panel options menu">
                  <button class="ui-menu-item toolbar-dropdown-option toolbar-dropdown-action toolbar-tab-hide-panel-option" type="button" role="menuitem">
                    <img class="toolbar-dropdown-icon" src="assets/sidebar.svg" alt="" aria-hidden="true">
                    <span class="toolbar-dropdown-label">Hide panel</span>
                  </button>
                  <div class="toolbar-dropdown-divider" aria-hidden="true"></div>
                  <div class="toolbar-tab-dropdown-heading ui-muted">Resize & Arrange</div>
                  <div class="toolbar-tab-layout-options" role="group" aria-label="Panel layout options">
                    <button class="ui-control ui-button ui-button-ghost toolbar-tab-layout-option is-active" type="button" data-layout="right" aria-label="Panel on right">
                      <span class="toolbar-tab-layout-preview is-right" aria-hidden="true"></span>
                    </button>
                    <button class="ui-control ui-button ui-button-ghost toolbar-tab-layout-option" type="button" data-layout="split" aria-label="50:50 split panel">
                      <span class="toolbar-tab-layout-preview is-split" aria-hidden="true"></span>
                    </button>
                    <button class="ui-control ui-button ui-button-ghost toolbar-tab-layout-option" type="button" data-layout="bottom" aria-label="Panel on bottom">
                      <span class="toolbar-tab-layout-preview is-bottom" aria-hidden="true"></span>
                    </button>
                    <button class="ui-control ui-button ui-button-ghost toolbar-tab-layout-option" type="button" data-layout="full" aria-label="Full panel">
                      <span class="toolbar-tab-layout-preview is-full" aria-hidden="true"></span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="table-wrap" id="tableWrap">
        <table>
          <thead>
            <tr>
              <th class="sortable-header" id="ownerColumnHeader" data-sort-key="ownerName" aria-sort="none" style="width: 31%"><span class="th-content">Name <img class="th-chevron" src="assets/chevron.svg" alt="" aria-hidden="true"></span></th>
              <th class="sortable-header" id="contactColumnHeader" data-sort-key="contactName" aria-sort="none" style="width: 31%"><span class="th-content">Contact <img class="th-chevron" src="assets/chevron.svg" alt="" aria-hidden="true"></span></th>
              <th class="sortable-header" id="combinedContactsHeader" data-sort-key="contacts" aria-sort="none" style="width: 12%"><span class="th-content">Contacts <img class="th-chevron" src="assets/chevron.svg" alt="" aria-hidden="true"></span></th>
              <th class="sortable-header" id="locationsColumnHeader" data-sort-key="locations" aria-sort="none" style="width: 12%"><span class="th-content">Units <img class="th-chevron" src="assets/chevron.svg" alt="" aria-hidden="true"></span></th>
              <th class="sortable-header" id="franchiseColumnHeader" data-sort-key="franchise" aria-sort="none" style="width: 12%"><span class="th-content">Franchises <img class="th-chevron" src="assets/chevron.svg" alt="" aria-hidden="true"></span></th>
            </tr>
          </thead>
          <tbody id="ownersTableBody"></tbody>
        </table>
        <p class="table-empty-state" id="tableEmptyState" role="status" hidden>We couldn't find anything matching your query.</p>
      </div>

      <aside class="map-panel" id="mapPanel" aria-label="Franchisee details">
        <div class="owner-map-header" id="ownerMapHeader" hidden></div>
        <div class="map-container panel-map-container" id="ownersMap"></div>
        <div class="owner-detail-panel" id="ownerDetailsPanel" hidden></div>
      </aside>
    </div>
  </main>

  <div class="profile-modal-overlay" id="profileModal" hidden>
    <section class="profile-modal" role="dialog" aria-modal="true" aria-labelledby="profileModalName">
      <button class="ui-control ui-close-button owner-detail-close profile-modal-close" type="button" aria-label="Close profile">
        <img src="assets/close.svg" alt="" aria-hidden="true">
      </button>
      <div class="profile-modal-content" id="profileModalContent"></div>
    </section>
  </div>

  <script src="data/owners.js"></script>
  <script src="data/locations.js"></script>
  <script src="data/org-chart.js"></script>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src=".env.local"></script>
  <script>
    if (!window.CST_ENV) {
      document.write('<script src="../../.env.local"><\/script>');
    }
  </script>
  <script src="scripts/01-dom-state.js"></script>
  <script src="scripts/02-view-settings.js"></script>
  <script src="scripts/03-map-panel.js"></script>
  <script src="scripts/04-owner-profile.js"></script>
  <script src="scripts/05-raw-data.js"></script>
  <script src="scripts/06-owner-details-org.js"></script>
  <script src="scripts/07-table-sort.js"></script>
  <script src="scripts/08-filters-combobox.js"></script>
  <script src="scripts/09-bootstrap.js"></script>
</body>
</html>
